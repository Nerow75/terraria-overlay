<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Terraria Overlay Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-neutral-950 text-slate-100 font-mono">
    <div class="max-w-6xl mx-auto p-4 space-y-4">

        <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4 space-y-3">
                <div class="text-lg font-extrabold">Config / Settings</div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-6 gap-3">
                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Label / Titre</label>
                    <input id="label"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none"
                        placeholder="MASTER MODE" />
                </div>

                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Objectif / Goal</label>
                    <input id="goal"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none"
                        placeholder="Ex: Arena Plantera" />
                </div>

                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Perso fichier / Player</label>
                    <select id="selectedPlayerFile"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none">
                        <option value="">Chargement...</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Monde fichier / World</label>
                    <select id="selectedWorldFile"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none">
                        <option value="">Chargement...</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Seed</label>
                    <input id="seed"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none"
                        placeholder="123456789" />
                </div>

                <div class="flex items-end">
                    <button id="saveBtn"
                        class="w-full rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">
                        Sauvegarder / Save
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-6 gap-3">
                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Defilement / Scroll (sec)</label>
                    <input id="scrollSeconds" type="number" min="10" max="120" step="1"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" />
                </div>
                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Cycle auto (sec)</label>
                    <input id="cycleSeconds" type="number" min="4" max="120" step="1"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" />
                </div>
                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">UI droite / Right UI (px)</label>
                    <input id="uiRightGutter" type="number" min="0" max="600" step="10"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" />
                </div>
                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Mode marquee</label>
                    <select id="marqueeModeLock"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none">
                        <option value="auto">Auto</option>
                        <option value="boss">Boss</option>
                        <option value="npc">NPC</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-white/70 tracking-widest uppercase">Langue / Language</label>
                    <select id="language"
                        class="mt-1 w-full rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none">
                        <option value="fr">Français</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <label class="flex items-end gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2">
                    <input id="focusNextBoss" type="checkbox" class="accent-emerald-400">
                    <span class="text-xs">Focus prochain boss / next boss</span>
                </label>
                <label class="flex items-end gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2">
                    <input id="showLastBossNotif" type="checkbox" class="accent-emerald-400">
                    <span class="text-xs">Notif dernier boss / last boss</span>
                </label>
            </div>

            <div id="status" class="text-sm text-white/70">-</div>
            <div class="text-xs text-white/50">Hotkeys: F1 mode Boss/NPC, F2 focus next boss.</div>
        </div>

        <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4 space-y-4">
            <div class="text-lg font-extrabold">Ilots overlay</div>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
                <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2">
                    <input id="antiSpoilCarousel" type="checkbox" class="accent-emerald-400">
                    <span class="text-xs">Carrousel anti-spoil (coches seulement)</span>
                </label>
                <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2">
                    <input id="syncRunTimerWithSave" type="checkbox" class="accent-emerald-400">
                    <span class="text-xs">Timer cale sur le temps de jeu du perso</span>
                </label>
                <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2">
                    <input id="layoutEditMode" type="checkbox" class="accent-emerald-400">
                    <span class="text-xs">Deplacement live dans l'overlay</span>
                </label>
                <button id="resetLayoutBtn"
                    class="rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">
                    Reinitialiser positions
                </button>
            </div>

            <div class="space-y-2">
                <div class="text-xs text-white/70 tracking-widest uppercase">Visibilite des ilots</div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-2">
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visBossToast" type="checkbox" class="accent-emerald-400"><span class="text-xs">Notification boss</span></label>
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visMarqueeBar" type="checkbox" class="accent-emerald-400"><span class="text-xs">Carrousel boss/NPC</span></label>
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visWebcamBox" type="checkbox" class="accent-emerald-400"><span class="text-xs">Cadre webcam</span></label>
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visSessionCard" type="checkbox" class="accent-emerald-400"><span class="text-xs">Carte session</span></label>
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visBottomLabelCard" type="checkbox" class="accent-emerald-400"><span class="text-xs">Carte label/seed</span></label>
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visBottomTimerCard" type="checkbox" class="accent-emerald-400"><span class="text-xs">Carte timer run</span></label>
                    <label class="flex items-center gap-2 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2"><input id="visBottomGoalCard" type="checkbox" class="accent-emerald-400"><span class="text-xs">Carte objectif</span></label>
                </div>
            </div>

            <div class="space-y-2">
                <div class="text-xs text-white/70 tracking-widest uppercase">Offsets X/Y (pixels)</div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
                    <div class="rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2 space-y-1">
                        <div class="text-xs text-white/70 uppercase">Carrousel</div>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="offset_marqueeBar_x" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="X">
                            <input id="offset_marqueeBar_y" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="Y">
                        </div>
                    </div>
                    <div class="rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2 space-y-1">
                        <div class="text-xs text-white/70 uppercase">Webcam</div>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="offset_webcamBox_x" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="X">
                            <input id="offset_webcamBox_y" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="Y">
                        </div>
                    </div>
                    <div class="rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2 space-y-1">
                        <div class="text-xs text-white/70 uppercase">Session</div>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="offset_sessionCard_x" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="X">
                            <input id="offset_sessionCard_y" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="Y">
                        </div>
                    </div>
                    <div class="rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2 space-y-1">
                        <div class="text-xs text-white/70 uppercase">Bas de l'ecran</div>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="offset_bottomWrap_x" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="X">
                            <input id="offset_bottomWrap_y" type="number" min="-2200" max="2200" step="1" class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none" placeholder="Y">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
            <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4 space-y-2">
                <div class="text-lg font-extrabold">Actions rapides / Quick actions</div>
                <button id="quickPreHard"
                    class="w-full rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">All
                    pre-hardmode done</button>
                <button id="quickHardmode"
                    class="w-full rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Hardmode
                    start</button>
                <button id="quickReset"
                    class="w-full rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Reset
                    run</button>
            </div>

            <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4 space-y-2">
                <div class="text-lg font-extrabold">Run Timer</div>
                <div id="timerDisplay" class="text-2xl font-extrabold">00:00:00</div>
                <div class="flex gap-2">
                    <button id="timerStart"
                        class="flex-1 rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Start</button>
                    <button id="timerPause"
                        class="flex-1 rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Pause</button>
                    <button id="timerReset"
                        class="flex-1 rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Reset</button>
                </div>
            </div>

            <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4 space-y-2">
                <div class="text-lg font-extrabold">Import / Export</div>
                <button id="exportBtn"
                    class="w-full rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Export
                    JSON</button>
                <input id="importFile" type="file" accept="application/json" class="hidden" />
                <button id="importBtn"
                    class="w-full rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Import
                    JSON</button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
            <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4">
                <div class="text-lg font-extrabold mb-3">Boss vaincus / Defeated</div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input id="bossSearch"
                        class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none"
                        placeholder="Recherche boss..." />
                    <select id="bossFilter"
                        class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none">
                        <option value="all">Tous</option>
                        <option value="done">Battus</option>
                        <option value="todo">Pas battus</option>
                    </select>
                </div>
                <div id="bossGrid" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                <div class="mt-3">
                    <button id="resetBoss"
                        class="rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Reset
                        Boss</button>
                </div>
            </div>

            <div class="rounded-2xl border border-white/10 bg-neutral-900/60 p-4">
                <div class="text-lg font-extrabold mb-3">NPC presents / Present</div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input id="npcSearch"
                        class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none"
                        placeholder="Recherche NPC..." />
                    <select id="npcFilter"
                        class="rounded-xl border border-white/10 bg-neutral-950/60 px-3 py-2 outline-none">
                        <option value="all">Tous</option>
                        <option value="done">Presents</option>
                        <option value="todo">Absents</option>
                    </select>
                </div>
                <div id="npcGrid" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                <div class="mt-3">
                    <button id="resetNpc"
                        class="rounded-xl border border-white/10 bg-neutral-950/50 px-3 py-2 hover:bg-neutral-950/70">Reset
                        NPC</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOSSES = [
            { en: "King Slime", fr: "Roi Slime", slug: "king-slime" },
            { en: "Eye of Cthulhu", fr: "Oeil de Cthulhu", slug: "eye-of-cthulhu" },
            { en: "Eater of Worlds", fr: "Devoreur des mondes", slug: "eater-of-worlds" },
            { en: "Brain of Cthulhu", fr: "Cerveau de Cthulhu", slug: "brain-of-cthulhu" },
            { en: "Queen Bee", fr: "Reine Abeille", slug: "queen-bee" },
            { en: "Skeletron", fr: "Skeletron", slug: "skeletron" },
            { en: "Deerclops", fr: "Deerclops", slug: "deerclops" },
            { en: "Wall of Flesh", fr: "Mur de chair", slug: "wall-of-flesh" },
            { en: "Queen Slime", fr: "Reine Slime", slug: "queen-slime" },
            { en: "The Twins", fr: "Les Jumeaux", slug: "the-twins" },
            { en: "The Destroyer", fr: "Le Destructeur", slug: "the-destroyer" },
            { en: "Skeletron Prime", fr: "Skeletron Prime", slug: "skeletron-prime" },
            { en: "Plantera", fr: "Plantera", slug: "plantera" },
            { en: "Golem", fr: "Golem", slug: "golem" },
            { en: "Duke Fishron", fr: "Duc Fishron", slug: "duke-fishron" },
            { en: "Empress of Light", fr: "Imperatrice de lumiere", slug: "empress-of-light" },
            { en: "Lunatic Cultist", fr: "Cultiste lunatique", slug: "lunatic-cultist" },
            { en: "Moon Lord", fr: "Seigneur de la lune", slug: "moon-lord" }
        ];

        const PRE_HARDMODE = BOSSES.slice(0, 8).map(x => x.slug);

        const NPCS = [
            { en: "Guide", fr: "Guide", slug: "npc-guide" },
            { en: "Merchant", fr: "Marchand", slug: "npc-merchant" },
            { en: "Nurse", fr: "Infirmiere", slug: "npc-nurse" },
            { en: "Demolitionist", fr: "Demolisseur", slug: "npc-demolitionist" },
            { en: "Arms Dealer", fr: "Marchand d'armes", slug: "npc-arms-dealer" },
            { en: "Dryad", fr: "Dryade", slug: "npc-dryad" },
            { en: "Goblin Tinkerer", fr: "Bricoleur gobelin", slug: "npc-goblin-tinkerer" },
            { en: "Mechanic", fr: "Mecanicienne", slug: "npc-mechanic" },
            { en: "Witch Doctor", fr: "Docteur vaudou", slug: "npc-witch-doctor" },
            { en: "Clothier", fr: "Tailleur", slug: "npc-clothier" },
            { en: "Wizard", fr: "Sorcier", slug: "npc-wizard" },
            { en: "Steampunker", fr: "Steampunker", slug: "npc-steampunker" },
            { en: "Truffle", fr: "Truffe", slug: "npc-truffle" },
            { en: "Cyborg", fr: "Cyborg", slug: "npc-cyborg" },
            { en: "Santa", fr: "Pere Noel", slug: "npc-santa" },
            { en: "Painter", fr: "Peintre", slug: "npc-painter" },
            { en: "Angler", fr: "Pecheur", slug: "npc-angler" },
            { en: "Dye Trader", fr: "Marchand de teintures", slug: "npc-dye-trader" },
            { en: "Golfer", fr: "Golfeur", slug: "npc-golfer" }
        ];

        const elStatus = document.getElementById("status");
        const elTimerDisplay = document.getElementById("timerDisplay");
        const elBossGrid = document.getElementById("bossGrid");
        const elNpcGrid = document.getElementById("npcGrid");
        const elImportFile = document.getElementById("importFile");
        const elPlayerFile = document.getElementById("selectedPlayerFile");
        const elWorldFile = document.getElementById("selectedWorldFile");
        const CONFIG_INPUT_IDS = ["label", "goal", "seed", "scrollSeconds", "cycleSeconds", "uiRightGutter"];
        const OFFSET_LIMIT = 2200;

        const ISLAND_VISIBILITY_INPUTS = [
            { key: "bossToast", id: "visBossToast" },
            { key: "marqueeBar", id: "visMarqueeBar" },
            { key: "webcamBox", id: "visWebcamBox" },
            { key: "sessionCard", id: "visSessionCard" },
            { key: "bottomLabelCard", id: "visBottomLabelCard" },
            { key: "bottomTimerCard", id: "visBottomTimerCard" },
            { key: "bottomGoalCard", id: "visBottomGoalCard" }
        ];

        const LAYOUT_OFFSET_INPUTS = [
            { key: "marqueeBar", xId: "offset_marqueeBar_x", yId: "offset_marqueeBar_y" },
            { key: "webcamBox", xId: "offset_webcamBox_x", yId: "offset_webcamBox_y" },
            { key: "sessionCard", xId: "offset_sessionCard_x", yId: "offset_sessionCard_y" },
            { key: "bottomWrap", xId: "offset_bottomWrap_x", yId: "offset_bottomWrap_y" }
        ];

        const LIMITS = {
            scrollMin: 10,
            scrollMax: 120,
            cycleMin: 4,
            cycleMax: 120,
            gutterMin: 0,
            gutterMax: 600
        };

        const API_ERROR_MESSAGES = {
            rate_limited: "Trop de requetes. Reessaye dans quelques secondes.",
            content_type_must_be_application_json: "Erreur de format de requete (JSON requis).",
            invalid_json: "JSON invalide.",
            patch_must_be_object: "Le patch doit etre un objet JSON.",
            invalid_language: "Langue invalide.",
            invalid_scroll_seconds: "Scroll invalide (10 a 120).",
            invalid_cycle_seconds: "Cycle invalide (4 a 120).",
            invalid_ui_right_gutter: "UI droite invalide (0 a 600).",
            invalid_marquee_mode_lock: "Mode marquee invalide.",
            invalid_done_boss: "Etat boss invalide.",
            invalid_done_npc: "Etat NPC invalide.",
            invalid_island_visibility: "Visibilite des ilots invalide.",
            invalid_layout_offsets: "Offsets des ilots invalides.",
            invalid_timer_cmd: "Commande timer invalide.",
            invalid_deaths_op: "Commande deaths invalide.",
            invalid_request: "Requete invalide.",
            internal_error: "Erreur interne serveur."
        };

        let state = null;
        let terrariaState = null;
        let configDirty = false;

        function currentLang() {
            return (state && state.language) || document.getElementById("language").value || "fr";
        }

        function displayName(it) {
            return currentLang() === "en" ? it.en : it.fr;
        }

        function fmtTime(ms) {
            const total = Math.floor((ms || 0) / 1000);
            const h = String(Math.floor(total / 3600)).padStart(2, "0");
            const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
            const s = String(total % 60).padStart(2, "0");
            return `${h}:${m}:${s}`;
        }

        function setStatus(message, level = "info") {
            elStatus.textContent = message;
            if (level === "error") {
                elStatus.className = "text-sm text-rose-300";
                return;
            }
            if (level === "success") {
                elStatus.className = "text-sm text-emerald-300";
                return;
            }
            elStatus.className = "text-sm text-white/70";
        }

        function parseNumberInRange(rawValue, minimum, maximum, label) {
            const parsed = Number.parseInt(String(rawValue ?? "").trim(), 10);
            if (!Number.isFinite(parsed)) {
                throw new Error(`${label}: valeur numerique requise.`);
            }
            if (parsed < minimum || parsed > maximum) {
                throw new Error(`${label}: valeur autorisee ${minimum} a ${maximum}.`);
            }
            return parsed;
        }

        function extractApiErrorMessage(data, fallbackMessage) {
            if (data && typeof data === "object") {
                const code = String(data.errorCode || data.error || "").trim();
                if (code && API_ERROR_MESSAGES[code]) {
                    return API_ERROR_MESSAGES[code];
                }
                if (typeof data.errorMessage === "string" && data.errorMessage.trim()) {
                    return data.errorMessage.trim();
                }
                if (typeof data.error === "string" && data.error.trim()) {
                    return data.error.trim();
                }
            }
            return fallbackMessage;
        }

        async function runSafe(task, contextLabel) {
            try {
                await task();
            } catch (error) {
                const msg = (error && error.message) ? error.message : String(error);
                setStatus(`${contextLabel}: ${msg}`, "error");
            }
        }

        function clampOffset(value) {
            const parsed = parseInt(value, 10);
            if (Number.isNaN(parsed)) return 0;
            return Math.max(-OFFSET_LIMIT, Math.min(OFFSET_LIMIT, parsed));
        }

        function readIslandVisibility() {
            const out = {};
            for (const conf of ISLAND_VISIBILITY_INPUTS) {
                out[conf.key] = !!document.getElementById(conf.id).checked;
            }
            return out;
        }

        function readLayoutOffsets() {
            const out = {};
            for (const conf of LAYOUT_OFFSET_INPUTS) {
                out[conf.key] = {
                    x: clampOffset(document.getElementById(conf.xId).value),
                    y: clampOffset(document.getElementById(conf.yId).value)
                };
            }
            return out;
        }

        async function getState() {
            const res = await fetch("/api/state", { cache: "no-cache" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            state = await res.json();
        }

        async function getTerrariaState() {
            const res = await fetch("/api/terraria", { cache: "no-cache" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            terrariaState = await res.json();
        }

        function fileOptionLabel(item) {
            const display = (item && item.displayName) ? item.displayName : (item && item.filename) ? item.filename : "-";
            const filename = (item && item.filename) ? item.filename : "-";
            return `${display} (${filename})`;
        }

        function fillFileSelect(selectEl, items, selectedFile, emptyText) {
            const rows = Array.isArray(items) ? items : [];
            const selected = String(selectedFile || "").trim();
            const exists = rows.some((it) => it.filename === selected);
            const effective = exists ? selected : (rows[0] ? rows[0].filename : "");

            selectEl.innerHTML = "";
            if (!rows.length) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = emptyText;
                selectEl.appendChild(option);
                return effective;
            }

            for (const it of rows) {
                const option = document.createElement("option");
                option.value = it.filename;
                option.textContent = fileOptionLabel(it);
                selectEl.appendChild(option);
            }
            selectEl.value = effective;
            return effective;
        }

        async function ensureSelectedSaveFiles() {
            if (!state || !terrariaState) return;

            const players = terrariaState.players || [];
            const worlds = terrariaState.worlds || [];
            const currentPlayer = String(state.selectedPlayerFile || "").trim();
            const currentWorld = String(state.selectedWorldFile || "").trim();

            const patch = {};
            if (players.length && !players.some((p) => p.filename === currentPlayer)) {
                patch.selectedPlayerFile = players[0].filename;
            }
            if (worlds.length && !worlds.some((w) => w.filename === currentWorld)) {
                patch.selectedWorldFile = worlds[0].filename;
            }

            if (Object.keys(patch).length) {
                await patchState(patch);
            }
        }

        async function patchState(patch) {
            const res = await fetch("/api/state", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(patch)
            });
            const contentType = String(res.headers.get("Content-Type") || "").toLowerCase();
            let data = {};
            if (contentType.includes("application/json")) {
                try {
                    data = await res.json();
                } catch {
                    data = {};
                }
            }

            if (!res.ok) {
                const fallback = `HTTP ${res.status}`;
                throw new Error(extractApiErrorMessage(data, fallback));
            }
            if (data && data.error) {
                throw new Error(extractApiErrorMessage(data, "Erreur API"));
            }
            state = data;
            setStatus("Sauvegarde OK", "success");
        }

        function filteredList(list, doneMap, searchValue, filterValue) {
            const q = (searchValue || "").trim().toLowerCase();
            return list.filter((it) => {
                const done = !!(doneMap && doneMap[it.slug]);
                if (filterValue === "done" && !done) return false;
                if (filterValue === "todo" && done) return false;
                const fullName = `${it.en} ${it.fr}`.toLowerCase();
                if (q && !fullName.includes(q)) return false;
                return true;
            });
        }

        function renderChecklist(list, doneMap, container, searchId, filterId, onChange) {
            const searchValue = document.getElementById(searchId).value;
            const filterValue = document.getElementById(filterId).value;
            const rows = filteredList(list, doneMap, searchValue, filterValue);

            container.innerHTML = "";
            for (const it of rows) {
                const checked = !!(doneMap && doneMap[it.slug]);
                const row = document.createElement("label");
                row.className = "flex items-center gap-3 rounded-xl border border-white/10 bg-neutral-950/40 px-3 py-2 cursor-pointer";
                row.innerHTML = `
                    <input type="checkbox" ${checked ? "checked" : ""} class="scale-125 accent-emerald-400">
                    <div class="font-bold">${displayName(it)}</div>
                `;
                const cb = row.querySelector("input");
                cb.addEventListener("change", () => {
                    void runSafe(() => onChange(it.slug, cb.checked), "Mise a jour checklist");
                });
                container.appendChild(row);
            }

            if (!rows.length) {
                const empty = document.createElement("div");
                empty.className = "text-sm text-white/50 px-1 py-1";
                empty.textContent = "Aucun resultat";
                container.appendChild(empty);
            }
        }

        function setInputValues() {
            if (configDirty) return;
            document.getElementById("label").value = state.label || "";
            document.getElementById("goal").value = state.goal || "";
            document.getElementById("seed").value = state.seed || "";
            document.getElementById("scrollSeconds").value = String(state.scrollSeconds ?? 22);
            document.getElementById("cycleSeconds").value = String(state.cycleSeconds ?? 10);
            document.getElementById("uiRightGutter").value = String(state.uiRightGutter ?? 320);
            document.getElementById("focusNextBoss").checked = !!state.focusNextBoss;
            document.getElementById("showLastBossNotif").checked = state.showLastBossNotif !== false;
            document.getElementById("marqueeModeLock").value = state.marqueeModeLock || "auto";
            document.getElementById("language").value = state.language || "fr";
            document.getElementById("antiSpoilCarousel").checked = !!state.antiSpoilCarousel;
            document.getElementById("syncRunTimerWithSave").checked = state.syncRunTimerWithSave !== false;
            document.getElementById("layoutEditMode").checked = !!state.layoutEditMode;

            const vis = state.islandVisibility || {};
            for (const conf of ISLAND_VISIBILITY_INPUTS) {
                document.getElementById(conf.id).checked = vis[conf.key] !== false;
            }

            const offsets = state.layoutOffsets || {};
            for (const conf of LAYOUT_OFFSET_INPUTS) {
                const item = offsets[conf.key] || {};
                document.getElementById(conf.xId).value = String(Number.isFinite(item.x) ? item.x : 0);
                document.getElementById(conf.yId).value = String(Number.isFinite(item.y) ? item.y : 0);
            }

            fillFileSelect(elPlayerFile, terrariaState?.players || [], state.selectedPlayerFile, "Aucun perso detecte");
            fillFileSelect(elWorldFile, terrariaState?.worlds || [], state.selectedWorldFile, "Aucun monde detecte");
        }

        function render() {
            setInputValues();
            elTimerDisplay.textContent = fmtTime(state.runElapsedMs || 0);

            renderChecklist(BOSSES, state.doneBoss || {}, elBossGrid, "bossSearch", "bossFilter", async (slug, checked) => {
                const doneBoss = { ...(state.doneBoss || {}), [slug]: checked };
                await patchState({ doneBoss });
                render();
            });

            renderChecklist(NPCS, state.doneNpc || {}, elNpcGrid, "npcSearch", "npcFilter", async (slug, checked) => {
                const doneNpc = { ...(state.doneNpc || {}), [slug]: checked };
                await patchState({ doneNpc });
                render();
            });
        }

        async function saveConfig() {
            const scrollSeconds = parseNumberInRange(
                document.getElementById("scrollSeconds").value,
                LIMITS.scrollMin,
                LIMITS.scrollMax,
                "Defilement"
            );
            const cycleSeconds = parseNumberInRange(
                document.getElementById("cycleSeconds").value,
                LIMITS.cycleMin,
                LIMITS.cycleMax,
                "Cycle auto"
            );
            const uiRightGutter = parseNumberInRange(
                document.getElementById("uiRightGutter").value,
                LIMITS.gutterMin,
                LIMITS.gutterMax,
                "UI droite"
            );

            await patchState({
                label: document.getElementById("label").value,
                goal: document.getElementById("goal").value,
                seed: document.getElementById("seed").value,
                selectedPlayerFile: elPlayerFile.value || "",
                selectedWorldFile: elWorldFile.value || "",
                language: document.getElementById("language").value,
                scrollSeconds,
                cycleSeconds,
                uiRightGutter,
                focusNextBoss: document.getElementById("focusNextBoss").checked,
                showLastBossNotif: document.getElementById("showLastBossNotif").checked,
                marqueeModeLock: document.getElementById("marqueeModeLock").value,
                antiSpoilCarousel: document.getElementById("antiSpoilCarousel").checked,
                syncRunTimerWithSave: document.getElementById("syncRunTimerWithSave").checked,
                layoutEditMode: document.getElementById("layoutEditMode").checked,
                islandVisibility: readIslandVisibility(),
                layoutOffsets: readLayoutOffsets()
            });
            configDirty = false;
            render();
        }

        async function quickPreHardmode() {
            const doneBoss = { ...(state.doneBoss || {}) };
            for (const slug of PRE_HARDMODE) doneBoss[slug] = true;
            await patchState({ doneBoss });
            render();
        }

        async function quickHardmodeStart() {
            const doneBoss = {};
            for (const slug of PRE_HARDMODE) doneBoss[slug] = true;
            for (const b of BOSSES) {
                if (!PRE_HARDMODE.includes(b.slug)) doneBoss[b.slug] = false;
            }
            await patchState({ doneBoss });
            render();
        }

        async function quickResetRun() {
            await patchState({
                doneBoss: {},
                doneNpc: {},
                goal: "",
                timerCmd: "reset",
                marqueeModeLock: "auto",
                focusNextBoss: false,
                antiSpoilCarousel: false
            });
            configDirty = false;
            render();
        }

        function exportState() {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "state-export.json";
            a.click();
            URL.revokeObjectURL(url);
        }

        async function importStateFromFile(file) {
            const txt = await file.text();
            const parsed = JSON.parse(txt);
            if (!parsed || typeof parsed !== "object") throw new Error("JSON invalide");

            const patch = {};
            const keys = [
                "label", "goal", "seed", "selectedPlayerFile", "selectedWorldFile", "scrollSeconds", "cycleSeconds",
                "uiRightGutter", "language", "focusNextBoss", "marqueeModeLock", "showLastBossNotif",
                "antiSpoilCarousel", "syncRunTimerWithSave", "layoutEditMode", "islandVisibility", "layoutOffsets",
                "doneBoss", "doneNpc"
            ];
            for (const k of keys) {
                if (k in parsed) patch[k] = parsed[k];
            }
            await patchState(patch);
            render();
        }

        function isFormTarget(target) {
            const tag = (target && target.tagName || "").toLowerCase();
            return tag === "input" || tag === "textarea" || tag === "select";
        }

        document.getElementById("saveBtn").addEventListener("click", () => runSafe(saveConfig, "Sauvegarde"));
        document.getElementById("resetBoss").addEventListener("click", () => runSafe(async () => { await patchState({ doneBoss: {} }); render(); }, "Reset boss"));
        document.getElementById("resetNpc").addEventListener("click", () => runSafe(async () => { await patchState({ doneNpc: {} }); render(); }, "Reset NPC"));
        document.getElementById("quickPreHard").addEventListener("click", () => runSafe(quickPreHardmode, "Action pre-hardmode"));
        document.getElementById("quickHardmode").addEventListener("click", () => runSafe(quickHardmodeStart, "Action hardmode"));
        document.getElementById("quickReset").addEventListener("click", () => runSafe(quickResetRun, "Reset run"));
        document.getElementById("timerStart").addEventListener("click", () => runSafe(async () => { await patchState({ timerCmd: "start" }); render(); }, "Timer start"));
        document.getElementById("timerPause").addEventListener("click", () => runSafe(async () => { await patchState({ timerCmd: "pause" }); render(); }, "Timer pause"));
        document.getElementById("timerReset").addEventListener("click", () => runSafe(async () => { await patchState({ timerCmd: "reset" }); render(); }, "Timer reset"));
        document.getElementById("exportBtn").addEventListener("click", exportState);
        document.getElementById("importBtn").addEventListener("click", () => elImportFile.click());

        elImportFile.addEventListener("change", async () => {
            if (!elImportFile.files || !elImportFile.files.length) return;
            try {
                await importStateFromFile(elImportFile.files[0]);
                setStatus("Import OK", "success");
            } catch (e) {
                setStatus("Import erreur: " + (e.message || e), "error");
            } finally {
                elImportFile.value = "";
            }
        });

        ["bossSearch", "bossFilter", "npcSearch", "npcFilter"].forEach((id) => {
            document.getElementById(id).addEventListener("input", render);
            document.getElementById(id).addEventListener("change", render);
        });

        ["focusNextBoss", "showLastBossNotif", "marqueeModeLock", "language", "antiSpoilCarousel", "syncRunTimerWithSave", "layoutEditMode"].forEach((id) => {
            document.getElementById(id).addEventListener("change", () => runSafe(saveConfig, "Sauvegarde"));
        });

        ISLAND_VISIBILITY_INPUTS.forEach((conf) => {
            document.getElementById(conf.id).addEventListener("change", () => runSafe(saveConfig, "Sauvegarde visibilite"));
        });

        LAYOUT_OFFSET_INPUTS.forEach((conf) => {
            document.getElementById(conf.xId).addEventListener("change", () => runSafe(saveConfig, "Sauvegarde offsets"));
            document.getElementById(conf.yId).addEventListener("change", () => runSafe(saveConfig, "Sauvegarde offsets"));
            document.getElementById(conf.xId).addEventListener("input", () => { configDirty = true; });
            document.getElementById(conf.yId).addEventListener("input", () => { configDirty = true; });
        });

        ["selectedPlayerFile", "selectedWorldFile"].forEach((id) => {
            document.getElementById(id).addEventListener("change", () => runSafe(saveConfig, "Sauvegarde selection fichiers"));
        });

        CONFIG_INPUT_IDS.forEach((id) => {
            document.getElementById(id).addEventListener("input", () => {
                configDirty = true;
            });
        });

        document.getElementById("resetLayoutBtn").addEventListener("click", () => runSafe(async () => {
            await patchState({
                layoutOffsets: {
                    marqueeBar: { x: 0, y: 0 },
                    webcamBox: { x: 0, y: 0 },
                    sessionCard: { x: 0, y: 0 },
                    bottomWrap: { x: 0, y: 0 }
                }
            });
            configDirty = false;
            render();
        }, "Reset layout"));

        document.addEventListener("keydown", async (e) => {
            if (isFormTarget(e.target)) return;
            if (e.key === "F1") {
                e.preventDefault();
                await runSafe(async () => {
                    const current = state.marqueeModeLock || "auto";
                    const next = current === "boss" ? "npc" : "boss";
                    await patchState({ marqueeModeLock: next });
                    render();
                }, "Hotkey F1");
            } else if (e.key === "F2") {
                e.preventDefault();
                await runSafe(async () => {
                    await patchState({ focusNextBoss: !state.focusNextBoss });
                    render();
                }, "Hotkey F2");
            }
        });

        window.addEventListener("unhandledrejection", (event) => {
            const reason = event && event.reason;
            const msg = (reason && reason.message) ? reason.message : String(reason || "Erreur inconnue");
            setStatus("Erreur non geree: " + msg, "error");
        });

        window.addEventListener("error", (event) => {
            const msg = (event && event.message) ? event.message : "Erreur JavaScript";
            setStatus("Erreur UI: " + msg, "error");
        });

        (async () => {
            try {
                await getState();
                await getTerrariaState();
                await ensureSelectedSaveFiles();
                render();
                setStatus("Pret", "success");
            } catch (e) {
                setStatus("Erreur init: " + (e.message || e), "error");
            }
            setInterval(async () => {
                try {
                    await getState();
                    await getTerrariaState();
                    await ensureSelectedSaveFiles();
                    render();
                } catch {
                    // keep current UI
                }
            }, 1500);
        })();
    </script>
</body>

</html>
